<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shorts-luni</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --surface: #ffffff;
        --text: #1c2533;
        --muted: #5a6473;
        --accent: #1864ab;
        --accent-soft: #e7f1ff;
        --border: #dce5f2;
        --shadow: 0 16px 36px rgba(15, 40, 75, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 15%, #d9eaff 0, transparent 42%),
          radial-gradient(circle at 85% 10%, #ffe7cb 0, transparent 40%),
          var(--bg);
      }

      main {
        width: min(1000px, 92vw);
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.7rem, 2vw + 1.1rem, 2.5rem);
        letter-spacing: 0.02em;
      }

      p {
        margin: 0 0 30px;
        color: var(--muted);
        font-size: 1.04rem;
      }

      .cards {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .card {
        display: block;
        padding: 20px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: linear-gradient(150deg, var(--surface), #f8fbff);
        box-shadow: var(--shadow);
        color: inherit;
        text-decoration: none;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-3px);
        border-color: #b8d4fb;
        box-shadow: 0 20px 40px rgba(15, 40, 75, 0.18);
        outline: none;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.02rem;
        letter-spacing: 0.04em;
      }

      .card span {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.84rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shorts-luni</h1>
      <p>Acces rapid la resursele de lucru pentru luni.</p>

      <section class="cards" aria-label="Linkuri rapide">
        <a
          class="card"
          href="https://evp.eduvit.ro/wp-admin/edit.php?s=luni&post_status=all&post_type=stm-assignments&action=-1&m=0&paged=1&action2=-1"
          target="_blank"
          rel="noopener noreferrer"
        >
          <h2>TEME</h2>
          <span>Deschide</span>
        </a>

        <a
          class="card"
          href="https://evp.eduvit.ro/wp-admin/?page=stm-lms-dashboard#/course/5619"
          target="_blank"
          rel="noopener noreferrer"
        >
          <h2>PROGRES CURSANȚI</h2>
          <span>Deschide</span>
        </a>

        <a
          class="card"
          href="https://drive.google.com/drive/folders/1iROkojj8HEn_9FrSpwSsF4n7on1m0CiK"
          target="_blank"
          rel="noopener noreferrer"
        >
          <h2>MATERIALE CURS</h2>
          <span>Deschide</span>
        </a>
      </section>
    </main>
  </body>
</html>
